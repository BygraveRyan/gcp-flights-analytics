name: "Deploy to Production"

on:
  push:
    branches: [ main ]
    paths:
      - 'cloud_functions/**'

jobs:
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: 'flights-analytics-prod'

      - name: Deploy fn-ingest-fr24
        run: |
          gcloud functions deploy fn-ingest-fr24 \
            --gen2 \
            --runtime=python312 \
            --region=europe-west2 \
            --source=cloud_functions/ingest_fr24 \
            --entry-point=ingest_fr24 \
            --trigger-http \
            --no-allow-unauthenticated \
            --timeout=120s \
            --memory=256Mi \
            --min-instances=0 \
            --service-account=flights-pipeline-sa@flights-analytics-prod.iam.gserviceaccount.com

      - name: Deploy fn-ingest-bts-csv
        run: |
          gcloud functions deploy fn-ingest-bts-csv \
            --gen2 \
            --runtime=python312 \
            --region=europe-west2 \
            --source=cloud_functions/ingest_bts_csv \
            --entry-point=ingest_bts_csv \
            --trigger-http \
            --no-allow-unauthenticated \
            --timeout=300s \
            --memory=512Mi \
            --min-instances=0 \
            --service-account=flights-pipeline-sa@flights-analytics-prod.iam.gserviceaccount.com

      - name: Deploy fn-gemini-monitor
        run: |
          gcloud functions deploy fn-gemini-monitor \
            --gen2 \
            --runtime=python312 \
            --region=europe-west2 \
            --source=cloud_functions/gemini_monitor \
            --entry-point=gemini_monitor \
            --trigger-http \
            --no-allow-unauthenticated \
            --timeout=120s \
            --memory=256Mi \
            --min-instances=0 \
            --service-account=flights-pipeline-sa@flights-analytics-prod.iam.gserviceaccount.com
