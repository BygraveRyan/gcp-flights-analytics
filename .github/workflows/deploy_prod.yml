name: "Deploy to Production"

on:
  push:
    branches: [ main ]
    paths:
      - 'cloud_functions/**'

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: 'google-github-actions/auth@v2'
        with:
          # Use the Workload Identity Provider for best practice in 2026
          # Or the secret key if you haven't set up WIF yet
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: 'flights-analytics-prod'

      - name: Deploy OpenSky Ingestion
        run: |
          gcloud functions deploy fn-ingest-opensky \
            --gen2 \
            --runtime=python312 \
            --region=europe-west2 \
            --source=cloud_functions/ingest_opensky \
            --entry-point=ingest_opensky \
            --trigger-http \
            --service-account=flights-pipeline-sa@flights-analytics-prod.iam.gserviceaccount.com